name: thforu
description: Multi-provider AI chat app with vision and voice
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  shared_preferences: ^2.3.0
  dio: ^5.4.3
  uuid: ^4.4.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  record: ^5.1.2
  flutter_markdown: ^0.7.1
  flutter_math_fork: ^0.7.3
  flutter_svg: ^2.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  path: ^1.9.0
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  file_picker: ^8.0.0
  wakelock_plus: ^1.2.0
  saver_gallery: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  record_linux: ^1.0.0
  record_platform_interface: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/app_icon.png"
